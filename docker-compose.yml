services:
  postgres:
    image: postgres:16-alpine
    container_name: daod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: daod
      POSTGRES_USER: daod
      POSTGRES_PASSWORD: daod_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daod -d daod"]
      interval: 10s
      timeout: 5s
      retries: 5

  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:v0.2.1
    container_name: daod-kokoro
    restart: unless-stopped
    ports:
      - "8880:8880"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8880/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
